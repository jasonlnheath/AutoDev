## JavaScript API

Native functions exposed to WebView:

```javascript
// Parameter control
window.setParam(paramId, value)     // Set parameter value
window.getParam(paramId)            // Get parameter value

// Preset management
window.loadPreset(index)            // Load factory preset by index
window.savePreset()                 // Open save dialog
window.loadPresetFile()             // Open load dialog

// UI control
window.setZoom(scale)               // Set UI zoom (0.75-2.0)
window.resizeWindow(width, height)  // Resize plugin window

// Meter updates (called from C++ timer)
window.updateMeters(inputDb, outputDb, inputPeak, outputPeak, cpu)
```

---

## C++ Classes

### HeathAudioLookAndFeel
Extends `juce::LookAndFeel_V4` with:
- Custom color scheme
- Rounded button backgrounds
- Document window title bar styling

### PluginProcessor
- Manages AudioProcessorParameters
- Handles preset save/load (XML)
- Implements oversampling
- Provides meter getters

### PluginEditor
- Owns WebBrowserComponent
- Implements resource provider
- Registers native functions
- Timer callback for meter updates

---

## Creating a New Plugin

1. Clone template from GitHub
2. Edit `TEMPLATE_CONFIG.yaml`:
   ```yaml
   plugin_name: "MyNewPlugin"
   manufacturer: "Heath Audio"
   version: "1.0.0"
   unique_id: "MHNP"  # 4-char plugin ID

   # Add plugin-specific parameters
   custom_parameters:
     - id: "mix"
       type: "float"
       min: 0.0
       max: 1.0
       default: 0.5
       label: "Mix"
   ```
3. Modify center panel in `index.html`
4. Add DSP code in `PluginProcessor.cpp`
5. Build with CMake

