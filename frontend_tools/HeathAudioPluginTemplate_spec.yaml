## Parameters (Template Includes)

| ID | Type | Range | Default | Label |
|----|------|-------|---------|-------|
| `input_gain` | float | -60.0 → 6.0 dB | 0.0 | IN |
| `output_gain` | float | -60.0 → 6.0 dB | 0.0 | OUT |
| `oversampling` | int | 1, 2, 4, 8 | 1 | OS |
| `zoom` | float | 0.75, 1.0, 1.25, 1.5, 2.0 | 1.0 | Zoom |

**Note:** Plugin-specific parameters (e.g., `mix`) added per-project.

