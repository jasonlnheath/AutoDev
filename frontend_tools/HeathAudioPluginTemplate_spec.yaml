# HeathAudioPluginTemplate - Product Specification

**Version:** 1.0
**Created:** 2026-02-16
**Target GUI Size:** 500 x 340 pixels (actual, not scaled)
**Source:** Extracted from AmpBender plugin

---

## Overview

A reusable JUCE plugin template with WebView-based HTML/CSS/JS frontend.
Clone from GitHub to create new plugins with consistent look and feel.

---

## What's Included

### Header Bar (Top Section)
| Component | Description |
|-----------|-------------|
| **IN knob** | Input gain/trim (-60 to +6 dB) |
| **Preset dropdown** | Factory presets + user presets |
| **Save button** | Save user preset to file |
| **Load button** | Load preset from file |
| **OS dropdown** | Oversampling (1x, 2x, 4x, 8x) |
| **Zoom dropdown** | UI scale (75%, 100%, 125%, 150%, 200%) |
| **OUT knob** | Output gain/trim (-60 to +6 dB) |
| **About button** | Heath Audio logo → opens about dialog |

### Meters (Side Sections)
| Component | Description |
|-----------|-------------|
| **Input meter** | Left edge, vertical dB scale (-60 to +6) |
| **Output meter** | Right edge, vertical dB scale (-60 to +6) |

### Center Panel (Plugin-Specific)
| Component | Description |
|-----------|-------------|
| **Background** | Dark panel with cyan accent border |
| **Content** | Placeholder - empty for template |

### Backend Functions
- Preset management (save/load XML state)
- Zoom scaling logic
- Oversampling switching
- Input/output trim parameters (AudioProcessorParameters)
- About screen dialog

### Infrastructure
- LookAndFeel class (HeathAudioLookAndFeel)
- WebView with resource provider
- Native function bridge (JS ↔ C++)
- Timer-based meter updates

